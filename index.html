<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VampySec Music</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a0033);
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 0 0 15px #bb00ff;
    }
    #player {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(30, 30, 40, 0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(187, 0, 255, 0.2);
    }
    audio {
      width: 100%;
      margin: 20px 0;
    }
    .controls {
      text-align: center;
      margin: 15px 0;
    }
    button {
      padding: 12px 18px;
      margin: 5px;
      background: #bb00ff;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: #dd33ff;
      transform: scale(1.05);
    }
    #playlist {
      margin-top: 25px;
      max-height: 420px;
      overflow-y: auto;
    }
    .song {
      padding: 14px 18px;
      margin: 6px 0;
      background: #252532;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .song:hover {
      background: #bb00ff;
      transform: translateX(8px);
    }
    .song.playing {
      background: #bb00ff;
      font-weight: 600;
    }
    .song-title {
      font-size: 1.05em;
    }
  </style>
</head>
<body>
  <h1>♪ VampySec Music ♪</h1>
  
  <div id="player">
    <audio id="audio" controls></audio>
    
    <div class="controls">
      <button onclick="prev()">⏮ Anterior</button>
      <button onclick="toggleShuffle()">🔀 Aleatorio</button>
      <button onclick="toggleRepeat()">🔁 Repetir</button>
      <button onclick="next()">⏭ Siguiente</button>
    </div>

    <h2>Playlist</h2>
    <div id="playlist"></div>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const playlistDiv = document.getElementById('playlist');

    // ================== AQUÍ AGREGAS TUS CANCIONES ==================
    let songs = [
      "SOY REAL (En Vivo) Dj Jader Tremendo x Twiste....mp3",
      "Soy Real.mp3",
      "TWO WICKED LEVELS - EL SEIS (2020).mp3",
      "Tajin (HTX Sauce).mp3",
      "Tu Cumpleaños (HTX Sauce).mp3",
      "Y esta copa la levanto y saludita por todos los e....mp3"
      // Agrega aquí las nuevas canciones manteniendo el formato:
      // "Nombre exacto de la canción.mp3",
    ];
    // ==============================================================

    let currentIndex = 0;
    let isShuffle = false;
    let isRepeat = false;

    function renderPlaylist() {
      playlistDiv.innerHTML = '';
      songs.forEach((song, index) => {
        const div = document.createElement('div');
        div.className = 'song';
        div.innerHTML = `<span class="song-title">${song}</span>`;
        div.onclick = () => playSong(index);
        playlistDiv.appendChild(div);
      });
    }

    function playSong(index) {
      if (index < 0 || index >= songs.length) return;
      currentIndex = index;
      audio.src = songs[index];
      audio.play();
      updatePlayingClass();
    }

    function next() {
      if (isShuffle) {
        currentIndex = Math.floor(Math.random() * songs.length);
      } else {
        currentIndex = (currentIndex + 1) % songs.length;
      }
      playSong(currentIndex);
    }

    function prev() {
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
      playSong(currentIndex);
    }

    function toggleShuffle() {
      isShuffle = !isShuffle;
      alert(isShuffle ? "🔀 Aleatorio Activado" : "🔀 Aleatorio Desactivado");
    }

    function toggleRepeat() {
      isRepeat = !isRepeat;
      audio.loop = isRepeat;
      alert(isRepeat ? "🔁 Repetir Activado" : "🔁 Repetir Desactivado");
    }

    function updatePlayingClass() {
      document.querySelectorAll('.song').forEach((el, i) => {
        el.classList.toggle('playing', i === currentIndex);
      });
    }

    audio.addEventListener('ended', () => {
      if (!isRepeat) next();
    });

    // Iniciar
    window.onload = () => {
      renderPlaylist();
      if (songs.length > 0) playSong(0); // Reproduce la primera automáticamente
    };
  </script>
</body>
</html>
