<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VampySec - Music</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 { margin: 20px 0; }
    #player {
      max-width: 600px;
      margin: 0 auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 15px;
    }
    audio {
      width: 100%;
      margin: 20px 0;
    }
    #playlist {
      text-align: left;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 20px;
    }
    .song {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }
    .song:hover, .song.playing {
      background: #333;
    }
    .controls {
      margin: 15px 0;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
      background: #bb00ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #dd33ff; }
  </style>
</head>
<body>
  <h1>♪ VampySec Music ♪</h1>
  
  <div id="player">
    <audio id="audio" controls></audio>
    
    <div class="controls">
      <button onclick="prev()">⏮ Anterior</button>
      <button onclick="toggleShuffle()">🔀 Aleatorio</button>
      <button onclick="toggleRepeat()">🔁 Repetir</button>
      <button onclick="next()">⏭ Siguiente</button>
    </div>

    <h2>Playlist</h2>
    <div id="playlist"></div>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const playlistDiv = document.getElementById('playlist');
    
    let songs = [];
    let currentIndex = 0;
    let isShuffle = false;
    let isRepeat = false;

    // Cargar todas las canciones automáticamente (archivos mp3, wav, ogg, etc.)
    async function loadSongs() {
      // Lista manual de canciones (debes poner aquí los nombres exactos)
      songs = [
        // Ejemplo:
        // "cancion1.mp3",
        // "cancion2.mp3"
      ];

      // Si quieres que intente detectar archivos (funciona solo en algunos servidores, GitHub Pages no lo permite bien)
      // Por eso te recomiendo listarlas manualmente.

      renderPlaylist();
    }

    function renderPlaylist() {
      playlistDiv.innerHTML = '';
      songs.forEach((song, index) => {
        const div = document.createElement('div');
        div.className = 'song';
        div.textContent = song;
        div.onclick = () => playSong(index);
        playlistDiv.appendChild(div);
      });
    }

    function playSong(index) {
      if (index < 0 || index >= songs.length) return;
      currentIndex = index;
      audio.src = songs[index];
      audio.play();
      updatePlayingClass();
    }

    function next() {
      if (isShuffle) {
        currentIndex = Math.floor(Math.random() * songs.length);
      } else {
        currentIndex = (currentIndex + 1) % songs.length;
      }
      playSong(currentIndex);
    }

    function prev() {
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
      playSong(currentIndex);
    }

    function toggleShuffle() {
      isShuffle = !isShuffle;
      alert(isShuffle ? "🔀 Modo Aleatorio Activado" : "🔀 Modo Aleatorio Desactivado");
    }

    function toggleRepeat() {
      isRepeat = !isRepeat;
      audio.loop = isRepeat;
      alert(isRepeat ? "🔁 Repetir Activado" : "🔁 Repetir Desactivado");
    }

    function updatePlayingClass() {
      document.querySelectorAll('.song').forEach((el, i) => {
        el.classList.toggle('playing', i === currentIndex);
      });
    }

    // Siguiente canción al terminar
    audio.addEventListener('ended', () => {
      if (!isRepeat) next();
    });

    // Cargar canciones al iniciar
    window.onload = loadSongs;
  </script>
</body>
</html>
